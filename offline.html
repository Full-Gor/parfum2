<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - Parfums Premium</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #bf9b30;
            font-family: 'Playfair Display', serif;
        }
        .icon {
            font-size: 72px;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            background: #bf9b30;
            color: #fff;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📶</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Vous semblez ne pas être connecté à Internet. Vérifiez votre connexion et réessayez.</p>
        <a href="/" class="btn">Réessayer</a>
    </div>
</body>
</html>
